<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ioe_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ioe_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    const IOE_BUILD_MARKER = 'eb8d4e4-probe1';
    console.info('IOE_BUILD_MARKER', IOE_BUILD_MARKER);

    // Sonda temprana de salud antes de inicializar Flutter.
    // Si no aparece en Network, el navegador no está usando este build.
    fetch(`/api/health?probe=${encodeURIComponent(IOE_BUILD_MARKER)}`, {
      method: 'GET',
      cache: 'no-store',
      credentials: 'same-origin',
    }).catch(() => {});

    // Hard reset de service workers/caches legacy para evitar servir bundles viejos.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          for (const reg of regs) {
            reg.unregister();
          }
        });
      });
    }
    if ('caches' in window) {
      caches.keys().then((keys) => {
        for (const key of keys) {
          caches.delete(key);
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
