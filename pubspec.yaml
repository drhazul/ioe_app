name: ioe_app
description: "IOE Frontend App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.8
  mobile_scanner: ^7.2.0
  local_auth: ^2.3.0
  uuid: ^4.5.1
  web: ^1.1.1
  pdf: ^3.11.0
  printing: ^5.12.0
  barcode_widget: ^2.0.4
  excel: ^4.0.6
  share_plus: ^12.0.2
  qr_flutter: ^4.1.0
  path_provider: ^2.1.5
  table_calendar: ^3.2.0
  socket_io_client: ^3.1.2
  fl_chart: ^1.1.1
  safe_device: ^1.3.10
  ntp: ^2.0.0
  device_info_plus: ^11.5.0
  image_picker: ^1.2.0
  flutter_image_compress: ^2.4.0
  sqflite: ^2.4.2
  path: ^1.9.1
  battery_plus: ^6.2.2
  crypto: ^3.0.6
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
